<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Client Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: "#C9A96E"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-black text-white font-[Inter]">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
  <h1 class="font-[Playfair_Display] text-xl">Client Dashboard</h1>

  <button onclick="logout()" class="text-sm bg-red-600 px-4 py-2 rounded">
    Logout
  </button>
</nav>

<!-- HEADER -->
<section class="p-6">
  <h2 class="text-3xl font-bold mb-2" data-aos="fade-up">
    <a href="admin.html">Welcome back 👋</a>
  </h2>
  <p class="text-gray-400" data-aos="fade-up" data-aos-delay="100">
    Track your projects and progress in real time
  </p>
</section>

<!-- STATS -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-6 px-6 mb-10">

  <div class="bg-white/5 backdrop-blur-lg p-6 rounded-xl" data-aos="zoom-in">
    <h3 class="text-gray-400">Total Projects</h3>
    <p id="totalProjects" class="text-2xl font-bold mt-2">0</p>
  </div>

  <div class="bg-white/5 backdrop-blur-lg p-6 rounded-xl" data-aos="zoom-in" data-aos-delay="100">
    <h3 class="text-gray-400">Ongoing</h3>
    <p id="ongoingProjects" class="text-2xl font-bold mt-2">0</p>
  </div>

  <div class="bg-white/5 backdrop-blur-lg p-6 rounded-xl" data-aos="zoom-in" data-aos-delay="200">
    <h3 class="text-gray-400">Completed</h3>
    <p id="completedProjects" class="text-2xl font-bold mt-2">0</p>
  </div>

</section>

<!-- PROJECTS -->
<section class="px-6 pb-20">
  <h2 class="text-2xl font-bold mb-6">My Projects</h2>

  <div id="projectList" class="grid md:grid-cols-3 gap-6"></div>
</section>

<!-- FOOTER -->
<footer class="border-t border-gray-800 text-center py-6 text-gray-500 text-sm">
  © 2026 MuffinsCode • Client Dashboard
</footer>

<!-- Scripts -->
<script src="dashboard.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>

</body>
</html>
