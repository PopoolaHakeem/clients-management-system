<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6">

    <h1 class="text-2xl mb-6">Admin Dashboard</h1>

    <form id="projectForm" class="space-y-4 max-w-md">
        <input id="name" placeholder="Project Name" class="w-full p-2 bg-gray-900">
        <input id="email" placeholder="Client Email" class="w-full p-2 bg-gray-900">
        <input id="status" placeholder="Status (Pending/Ongoing/Done)" class="w-full p-2 bg-gray-900">
        <textarea id="desc" placeholder="Description" class="w-full p-2 bg-gray-900"></textarea>

        <button class="bg-yellow-500 text-black px-4 py-2 rounded">
            Add Project
        </button>
    </form>
