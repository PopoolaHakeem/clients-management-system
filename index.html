<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

    <form id="loginForm" class="bg-gray-900 p-8 rounded-xl w-80 space-y-4">
        <h2 class="text-xl font-bold text-center">
            Client Login
        </h2>

        <input id="email" type="email" placeholder="Email" class="w-full p-3 rounded bg-black border border-gray-700">

        <button class="w-full bg-yellow-500 text-black py-2 rounded hover:bg-yellow-600 transition-colors">
            Login
        </button>
    </form>

    <script src="script.js"></script>
</body>

</html>
